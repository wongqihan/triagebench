# TriageBench model registry. Adding a model on release day is one entry here —
# no code changes. `provider` is one of: anthropic, openai, google.
claude:
  provider: anthropic
  api_model: claude-opus-4-8
  max_tokens: 2048
  # Opus 4.8 removed sampling params; sending `temperature` is a 400.
  supports_temperature: false
claude-sonnet:
  provider: anthropic
  api_model: claude-sonnet-4-6
  max_tokens: 2048
claude-haiku:
  provider: anthropic
  api_model: claude-haiku-4-5
  max_tokens: 2048
gpt:
  provider: openai
  api_model: gpt-5.4-mini
  max_tokens: 2048
gemini:
  provider: google
  api_model: gemini-3.5-flash
  max_tokens: 2048

# --- frontier tier (for cross-tier comparison runs) ---
gpt-5.5:
  provider: openai
  api_model: gpt-5.5
  max_tokens: 2048
  supports_temperature: false   # GPT-5.5 removed sampling params (400 if sent)
gemini-pro:
  provider: google
  api_model: gemini-3.1-pro-preview
  max_tokens: 2048
deepseek-pro:
  provider: openai            # OpenAI-compatible endpoint
  api_model: deepseek-v4-pro
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  max_tokens: 2048
deepseek-flash:
  provider: openai
  api_model: deepseek-v4-flash
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  max_tokens: 2048

# --- economy tier (cheapest; for low-cost leaderboard runs) ---
gpt-nano:
  provider: openai
  api_model: gpt-5.4-nano
  max_tokens: 2048
gemini-flash-lite:
  provider: google
  api_model: gemini-3.1-flash-lite
  max_tokens: 2048
